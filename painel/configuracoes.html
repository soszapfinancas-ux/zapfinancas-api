<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZapFinanças — Configurações</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{brand:{50:'#ecfdf5',100:'#d1fae5',500:'#10b981',600:'#059669',700:'#047857',900:'#064e3b'}}}}}</script>
</head>
<body class="bg-gray-50 font-sans">
<div class="flex h-screen overflow-hidden">

<aside class="w-64 bg-brand-900 text-white flex flex-col shrink-0">
  <div class="p-6 border-b border-brand-700">
    <div class="flex items-center gap-3">
      <span class="text-2xl">💰</span>
      <div><div class="font-bold text-lg">ZapFinanças</div>
        <div id="userName" class="text-brand-300 text-xs"></div></div>
    </div>
  </div>
  <nav class="flex-1 p-4 space-y-1 text-sm">
    <a href="dashboard.html"   class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-brand-700">📊 Dashboard</a>
    <a href="relatorios.html"  class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-brand-700">📋 Relatórios</a>
    <a href="configuracoes.html" class="flex items-center gap-3 px-3 py-2 rounded-lg bg-brand-700 font-medium">⚙️ Configurações</a>
  </nav>
  <div class="p-4 border-t border-brand-700">
    <button onclick="logout()" class="w-full text-left text-sm text-brand-300 hover:text-white px-3 py-2">🚪 Sair</button>
  </div>
</aside>

<main class="flex-1 overflow-y-auto">
  <header class="bg-white border-b px-6 py-4">
    <h1 class="text-xl font-bold text-gray-800">Configurações</h1>
  </header>

  <div class="p-6 grid grid-cols-1 lg:grid-cols-2 gap-6">

    <!-- CATEGORIAS -->
    <div class="bg-white rounded-xl shadow-sm border flex flex-col">
      <div class="flex items-center justify-between p-5 border-b">
        <h2 class="font-semibold text-gray-700">🏷️ Categorias</h2>
        <button onclick="openCatModal()"
          class="bg-brand-600 hover:bg-brand-700 text-white text-sm px-3 py-1.5 rounded-lg">+ Adicionar</button>
      </div>
      <div id="catList" class="flex-1 divide-y overflow-y-auto max-h-96">
        <div class="p-4 text-center text-gray-400 text-sm">Carregando...</div>
      </div>
    </div>

    <!-- FORMAS DE PAGAMENTO -->
    <div class="bg-white rounded-xl shadow-sm border flex flex-col">
      <div class="flex items-center justify-between p-5 border-b">
        <h2 class="font-semibold text-gray-700">💳 Formas de Pagamento</h2>
        <button onclick="openFpModal()"
          class="bg-brand-600 hover:bg-brand-700 text-white text-sm px-3 py-1.5 rounded-lg">+ Adicionar</button>
      </div>
      <div id="fpList" class="flex-1 divide-y overflow-y-auto max-h-96">
        <div class="p-4 text-center text-gray-400 text-sm">Carregando...</div>
      </div>
    </div>

  </div>
</main>
</div>

<!-- Modal Categoria -->
<div id="catModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6">
    <h3 id="catModalTitle" class="font-bold text-lg text-gray-800 mb-4">Nova Categoria</h3>
    <input type="hidden" id="catId">
    <div class="space-y-3">
      <div>
        <label class="text-xs font-medium text-gray-600">Nome *</label>
        <input id="catNome" type="text" placeholder="Ex: Streaming"
          class="w-full mt-1 border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none">
      </div>
      <div class="flex gap-3">
        <div class="flex-1">
          <label class="text-xs font-medium text-gray-600">Emoji/Ícone</label>
          <input id="catIcone" type="text" placeholder="🎬"
            class="w-full mt-1 border rounded-lg px-3 py-2 text-sm text-center text-xl focus:ring-2 focus:ring-brand-500 outline-none">
        </div>
        <div class="flex-1">
          <label class="text-xs font-medium text-gray-600">Cor</label>
          <input id="catCor" type="color" value="#6366f1"
            class="w-full mt-1 border rounded-lg h-10 cursor-pointer">
        </div>
      </div>
      <div>
        <label class="text-xs font-medium text-gray-600">Tipo</label>
        <select id="catTipo" class="w-full mt-1 border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none">
          <option value="ambos">Receita e Despesa</option>
          <option value="receita">Apenas Receita</option>
          <option value="despesa">Apenas Despesa</option>
        </select>
      </div>
    </div>
    <div class="flex gap-2 mt-5">
      <button onclick="closeCatModal()" class="flex-1 border rounded-lg py-2 text-sm text-gray-600 hover:bg-gray-50">Cancelar</button>
      <button onclick="saveCategoria()" class="flex-1 bg-brand-600 hover:bg-brand-700 text-white rounded-lg py-2 text-sm font-medium">Salvar</button>
    </div>
    <p id="catErr" class="text-red-500 text-xs mt-2 hidden"></p>
  </div>
</div>

<!-- Modal Forma de Pagamento -->
<div id="fpModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6">
    <h3 id="fpModalTitle" class="font-bold text-lg text-gray-800 mb-4">Nova Forma de Pagamento</h3>
    <input type="hidden" id="fpId">
    <div>
      <label class="text-xs font-medium text-gray-600">Nome *</label>
      <input id="fpNome" type="text" placeholder="Ex: Nubank"
        class="w-full mt-1 border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none"
        onkeydown="if(event.key==='Enter')saveFp()">
    </div>
    <div class="flex gap-2 mt-5">
      <button onclick="closeFpModal()" class="flex-1 border rounded-lg py-2 text-sm text-gray-600 hover:bg-gray-50">Cancelar</button>
      <button onclick="saveFp()" class="flex-1 bg-brand-600 hover:bg-brand-700 text-white rounded-lg py-2 text-sm font-medium">Salvar</button>
    </div>
    <p id="fpErr" class="text-red-500 text-xs mt-2 hidden"></p>
  </div>
</div>

<script>
const API   = '';
const token = localStorage.getItem('zf_token');
const user  = JSON.parse(localStorage.getItem('zf_user') || '{}');
if (!token) location.href = 'index.html';

document.getElementById('userName').textContent = user.nome?.split(' ')[0] || '';

async function api(path, opts={}) {
  const r = await fetch(API+path, { headers:{ apikey:token, 'Content-Type':'application/json' }, ...opts });
  if (r.status===401) { logout(); return null; }
  return r.json();
}

// ── CATEGORIAS ───────────────────────────────────

async function loadCats() {
  const cats = await api('/api/categories');
  if (!cats) return;
  document.getElementById('catList').innerHTML = cats.length
    ? cats.map(c=>`
      <div class="flex items-center justify-between px-5 py-3 hover:bg-gray-50">
        <div class="flex items-center gap-3">
          <span class="text-xl">${c.icone||'🔖'}</span>
          <div>
            <div class="text-sm font-medium text-gray-800">${c.nome}</div>
            <div class="text-xs text-gray-400">${{ambos:'Rec. e Desp.',receita:'Receita',despesa:'Despesa'}[c.tipo]||''}</div>
          </div>
        </div>
        <div class="flex gap-2">
          <button onclick="editCat(${JSON.stringify(c).replace(/"/g,'&quot;')})"
            class="text-xs text-blue-500 hover:text-blue-700 px-2 py-1">✏️ Editar</button>
          <button onclick="deleteCat(${c.id})"
            class="text-xs text-red-400 hover:text-red-600 px-2 py-1">🗑️</button>
        </div>
      </div>`).join('')
    : '<div class="p-4 text-center text-gray-400 text-sm">Nenhuma categoria</div>';
}

function openCatModal(clear=true) {
  if(clear){
    document.getElementById('catId').value='';
    document.getElementById('catNome').value='';
    document.getElementById('catIcone').value='';
    document.getElementById('catCor').value='#6366f1';
    document.getElementById('catTipo').value='ambos';
    document.getElementById('catModalTitle').textContent='Nova Categoria';
  }
  document.getElementById('catErr').classList.add('hidden');
  document.getElementById('catModal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('catNome').focus(),50);
}

function closeCatModal() { document.getElementById('catModal').classList.add('hidden'); }

function editCat(c) {
  document.getElementById('catId').value    = c.id;
  document.getElementById('catNome').value  = c.nome;
  document.getElementById('catIcone').value = c.icone||'';
  document.getElementById('catCor').value   = c.cor||'#6366f1';
  document.getElementById('catTipo').value  = c.tipo||'ambos';
  document.getElementById('catModalTitle').textContent = 'Editar Categoria';
  openCatModal(false);
}

async function saveCategoria() {
  const id    = document.getElementById('catId').value;
  const nome  = document.getElementById('catNome').value.trim();
  const icone = document.getElementById('catIcone').value.trim();
  const cor   = document.getElementById('catCor').value;
  const tipo  = document.getElementById('catTipo').value;
  if (!nome) { document.getElementById('catErr').textContent='Nome é obrigatório'; document.getElementById('catErr').classList.remove('hidden'); return; }

  const body = JSON.stringify({nome, icone, cor, tipo});
  const r    = id
    ? await api(`/api/categories/${id}`, {method:'PUT',  body})
    : await api('/api/categories',        {method:'POST', body});
  if (!r) return;
  closeCatModal();
  loadCats();
}

async function deleteCat(id) {
  if (!confirm('Deletar categoria?')) return;
  await api(`/api/categories/${id}`, {method:'DELETE'});
  loadCats();
}

// ── FORMAS DE PAGAMENTO ─────────────────────────

async function loadFp() {
  const fps = await api('/api/payment-methods');
  if (!fps) return;
  document.getElementById('fpList').innerHTML = fps.length
    ? fps.map(f=>`
      <div class="flex items-center justify-between px-5 py-3 hover:bg-gray-50">
        <span class="text-sm font-medium text-gray-800">💳 ${f.nome}</span>
        <div class="flex gap-2">
          <button onclick="editFp(${f.id},'${f.nome}')"
            class="text-xs text-blue-500 hover:text-blue-700 px-2 py-1">✏️</button>
          <button onclick="deleteFp(${f.id})"
            class="text-xs text-red-400 hover:text-red-600 px-2 py-1">🗑️</button>
        </div>
      </div>`).join('')
    : '<div class="p-4 text-center text-gray-400 text-sm">Nenhuma forma de pagamento</div>';
}

function openFpModal(clear=true) {
  if(clear){ document.getElementById('fpId').value=''; document.getElementById('fpNome').value=''; document.getElementById('fpModalTitle').textContent='Nova Forma de Pagamento'; }
  document.getElementById('fpErr').classList.add('hidden');
  document.getElementById('fpModal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('fpNome').focus(),50);
}

function closeFpModal() { document.getElementById('fpModal').classList.add('hidden'); }

function editFp(id, nome) {
  document.getElementById('fpId').value   = id;
  document.getElementById('fpNome').value = nome;
  document.getElementById('fpModalTitle').textContent = 'Editar Forma de Pagamento';
  openFpModal(false);
}

async function saveFp() {
  const id   = document.getElementById('fpId').value;
  const nome = document.getElementById('fpNome').value.trim();
  if (!nome) { document.getElementById('fpErr').textContent='Nome é obrigatório'; document.getElementById('fpErr').classList.remove('hidden'); return; }

  const body = JSON.stringify({nome});
  const r    = id
    ? await api(`/api/payment-methods/${id}`, {method:'PUT',  body})
    : await api('/api/payment-methods',        {method:'POST', body});
  if (!r) return;
  closeFpModal();
  loadFp();
}

async function deleteFp(id) {
  if (!confirm('Remover forma de pagamento?')) return;
  await api(`/api/payment-methods/${id}`, {method:'DELETE'});
  loadFp();
}

function logout() {
  fetch(`${API}/api/auth/logout`,{method:'POST',headers:{apikey:token}}).catch(()=>{});
  localStorage.clear(); location.href='index.html';
}

loadCats();
loadFp();
</script>
</body></html>
