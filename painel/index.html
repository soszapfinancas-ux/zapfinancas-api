<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZapFinanças — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{brand:{50:'#ecfdf5',100:'#d1fae5',500:'#10b981',600:'#059669',700:'#047857',900:'#064e3b'}}}}}</script>
<style>body{background:linear-gradient(135deg,#064e3b 0%,#059669 100%);min-height:100vh}</style>
</head>
<body class="flex items-center justify-center p-4">
<div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">

  <!-- Logo -->
  <div class="text-center mb-8">
    <img src="logo.png" alt="ZapFinanças" class="h-20 w-auto mx-auto mb-3">
    <p class="text-gray-500 text-sm">Controle financeiro pelo WhatsApp</p>
  </div>

  <!-- Etapa 1: telefone -->
  <div id="step1">
    <p class="text-center text-gray-600 mb-6 text-sm">Digite seu número do WhatsApp para receber o código de acesso</p>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">WhatsApp</label>
      <div class="flex">
        <span class="inline-flex items-center px-3 border border-r-0 border-gray-300 rounded-l-lg bg-gray-50 text-gray-500 text-sm">+55</span>
        <input id="phone" type="tel" placeholder="41 9 9999-9999"
          class="flex-1 px-4 py-3 border border-gray-300 rounded-r-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none text-gray-800"
          onkeydown="if(event.key==='Enter')requestCode()">
      </div>
    </div>
    <button onclick="requestCode()"
      class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3 rounded-lg transition-colors">
      Enviar código via WhatsApp
    </button>
    <p id="err1" class="text-red-500 text-sm mt-3 text-center hidden"></p>
  </div>

  <!-- Etapa 2: código OTP -->
  <div id="step2" class="hidden">
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">📱</div>
      <p class="text-gray-600 text-sm">Enviamos um código de 6 dígitos para seu WhatsApp.<br>Válido por 5 minutos.</p>
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Código</label>
      <input id="code" type="text" maxlength="6" placeholder="000000"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg text-center text-2xl tracking-widest font-mono focus:ring-2 focus:ring-brand-500 outline-none"
        onkeydown="if(event.key==='Enter')verifyCode()">
    </div>
    <button onclick="verifyCode()"
      class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3 rounded-lg transition-colors">
      Entrar
    </button>
    <button onclick="back()" class="w-full mt-2 text-gray-500 hover:text-gray-700 text-sm py-2">
      ← Usar outro número
    </button>
    <p id="err2" class="text-red-500 text-sm mt-3 text-center hidden"></p>
  </div>

  <!-- Loading -->
  <div id="loading" class="hidden text-center py-4">
    <div class="inline-block w-8 h-8 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
    <p class="text-gray-500 text-sm mt-2">Aguarde...</p>
  </div>

</div>

<script>
const API = '';  // mesmo host

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.remove('hidden');
}
function hideErr(id) { document.getElementById(id).classList.add('hidden'); }
function setLoading(on) {
  document.getElementById('loading').classList.toggle('hidden', !on);
  document.querySelectorAll('button').forEach(b => b.disabled = on);
}

async function requestCode() {
  hideErr('err1');
  const raw   = document.getElementById('phone').value.replace(/\D/g, '');
  if (raw.length < 10) return showErr('err1', 'Digite um número válido com DDD');

  setLoading(true);
  try {
    const r = await fetch(`${API}/api/auth/request-code`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ phone: raw }),
    });
    const d = await r.json();
    if (!r.ok) return showErr('err1', d.error || 'Erro ao enviar código');
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
    document.getElementById('code').focus();
  } catch(e) {
    showErr('err1', 'Erro de conexão. Tente novamente.');
  } finally {
    setLoading(false);
  }
}

async function verifyCode() {
  hideErr('err2');
  const phone = document.getElementById('phone').value.replace(/\D/g, '');
  const code  = document.getElementById('code').value.trim();
  if (code.length !== 6) return showErr('err2', 'O código tem 6 dígitos');

  setLoading(true);
  try {
    const r = await fetch(`${API}/api/auth/verify-code`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ phone, code }),
    });
    const d = await r.json();
    if (!r.ok) return showErr('err2', d.error || 'Código inválido');
    localStorage.setItem('zf_token', d.token);
    localStorage.setItem('zf_user',  JSON.stringify(d.user));
    window.location.href = 'dashboard.html';
  } catch(e) {
    showErr('err2', 'Erro de conexão. Tente novamente.');
  } finally {
    setLoading(false);
  }
}

function back() {
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('code').value = '';
}

// Redireciona se já autenticado
if (localStorage.getItem('zf_token')) window.location.href = 'dashboard.html';
</script>
</body></html>
